<!--
TERRAPIN AGENT INTERFACE
Tool: QR Code Generator
Description: Create QR codes for URLs, WiFi, Zelle, phone, email, or text
Parameters:
  - type (string, optional): url|zelle|wifi|phone|email|text (default url)
  - data (string, required): The content to encode (URL, phone number, email, or text)
  - wifi_ssid (string, optional): WiFi network name (when type=wifi)
  - wifi_pass (string, optional): WiFi password (when type=wifi)
  - wifi_enc (string, optional): WPA|WEP|nopass (default WPA)
  - zelle_to (string, optional): Zelle recipient (when type=zelle)
  - zelle_amount (string, optional): Payment amount
  - zelle_memo (string, optional): Payment memo
  - email_subject (string, optional): Email subject line (when type=email)
  - fg_color (string, optional): QR foreground hex color (default #1a1a1a)
  - bg_color (string, optional): QR background hex color (default #ffffff)
  - size (number, optional): Preview size 200|300|400 (default 300)
  - biz_name (string, optional): Business name text below QR
Output: QR code preview with PNG and SVG download
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Terrapin Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #F5F0E8; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  .container { max-width: 740px; margin: 0 auto; }

  .app-header { text-align: center; margin-bottom: 1.5rem; }
  .app-header h1 { font-family: 'Lora', serif; font-size: 26px; font-weight: 700; color: #2C3E2D; }
  .app-header p { font-size: 14px; color: #6B6B6B; margin-top: 2px; }

  .card { background: #fff; border-radius: 12px; border: 1px solid #E8E0D0; padding: 24px; margin-bottom: 16px; }
  .card-title { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: #6B6B6B; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #E8E0D0; }

  label { font-size: 13px; color: #6B6B6B; font-weight: 500; display: block; margin-bottom: 6px; }
  input[type="text"], input[type="url"], input[type="email"], input[type="tel"], select {
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: #1a1a1a;
    background: #FDFAF4; border: 1px solid #E8E0D0;
    border-radius: 8px; padding: 10px 12px; width: 100%;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { outline: none; border-color: #2C3E2D; background: #fff; }

  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

  /* Type tabs */
  .type-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .type-tab {
    padding: 9px 16px; border-radius: 8px; border: 1.5px solid #E8E0D0;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; background: #FDFAF4; color: #1a1a1a; transition: all 0.15s;
  }
  .type-tab:hover { border-color: #2C3E2D; color: #2C3E2D; }
  .type-tab.active { background: #2C3E2D; color: #fff; border-color: #2C3E2D; }

  .type-fields { display: none; }
  .type-fields.active { display: block; }

  /* Size selector */
  .size-tabs { display: flex; gap: 6px; }
  .size-tab {
    flex: 1; text-align: center; padding: 9px 12px; border-radius: 8px;
    border: 1.5px solid #E8E0D0; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; background: #FDFAF4;
    color: #1a1a1a; transition: all 0.15s;
  }
  .size-tab:hover { border-color: #2C3E2D; }
  .size-tab.active { background: #2C3E2D; color: #fff; border-color: #2C3E2D; }

  /* Color pickers */
  .color-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .color-field { display: flex; align-items: center; gap: 8px; }
  .color-field label { margin-bottom: 0; white-space: nowrap; }
  input[type="color"] {
    width: 40px; height: 36px; border: 1px solid #E8E0D0; border-radius: 6px;
    padding: 2px; cursor: pointer; background: #FDFAF4;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

  /* Preview */
  .preview-area {
    display: flex; flex-direction: column; align-items: center; padding: 32px 20px;
    min-height: 280px; justify-content: center;
  }
  #qr-canvas-wrap { position: relative; }
  #qr-canvas-wrap canvas { display: block; }
  .biz-name-preview {
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    text-align: center; margin-top: 10px; color: #1a1a1a;
  }
  .preview-empty { color: #6B6B6B; font-size: 14px; text-align: center; }

  /* Buttons */
  .download-row { display: flex; gap: 10px; margin-top: 16px; }
  .btn-primary {
    flex: 1; background: #2C3E2D; color: #fff; padding: 12px 24px; border-radius: 8px;
    border: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.15s; text-align: center;
  }
  .btn-primary:hover { background: #3A5240; }
  .btn-secondary {
    flex: 1; background: transparent; color: #2C3E2D; padding: 12px 24px; border-radius: 8px;
    border: 1.5px solid #2C3E2D; font-family: 'DM Sans', sans-serif; font-size: 15px;
    font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .btn-secondary:hover { background: rgba(44,62,45,0.06); }

  .api-note { text-align: center; font-size: 11px; color: #6B6B6B; margin-top: 16px; }

  .hint { font-size: 12px; color: #6B6B6B; margin-top: 4px; }

  .back-to-terrapin { display: block; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #6B6B6B; text-decoration: none; padding: 16px 0 8px; transition: color 0.15s; }
  .back-to-terrapin:hover { color: #2C3E2D; }

  @media (max-width: 520px) {
    .row { grid-template-columns: 1fr; }
    .type-tabs { gap: 4px; }
    .type-tab { padding: 7px 12px; font-size: 12px; }
    .download-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">
  <a href="https://terrapin.tools" class="back-to-terrapin">&#8592; Back to Terrapin Tools</a>

  <div class="app-header">
    <h1>QR Code Generator</h1>
    <p>Create QR codes for your business — no watermarks, no limits</p>
  </div>

  <!-- INPUT TYPE -->
  <div class="card">
    <div class="card-title">What are you linking to?</div>
    <div class="type-tabs" id="type-tabs">
      <button class="type-tab active" data-type="url">URL</button>
      <button class="type-tab" data-type="zelle">Zelle</button>
      <button class="type-tab" data-type="wifi">WiFi</button>
      <button class="type-tab" data-type="phone">Phone</button>
      <button class="type-tab" data-type="email">Email</button>
      <button class="type-tab" data-type="text">Text</button>
    </div>

    <div class="type-fields active" id="fields-url">
      <div class="field">
        <label>Website URL</label>
        <input type="url" id="input-url" placeholder="https://yourbusiness.com" oninput="generate()">
      </div>
    </div>

    <div class="type-fields" id="fields-zelle">
      <div class="field">
        <label>Zelle email or phone</label>
        <input type="text" id="input-zelle-to" placeholder="you@business.com or (555) 123-4567" oninput="generate()">
      </div>
      <div class="row">
        <div class="field">
          <label>Amount (optional)</label>
          <input type="text" id="input-zelle-amount" placeholder="25.00" oninput="generate()">
        </div>
        <div class="field">
          <label>Memo (optional)</label>
          <input type="text" id="input-zelle-memo" placeholder="Invoice #123" oninput="generate()">
        </div>
      </div>
      <p class="hint">Creates a Zelle-compatible payment link your customers can scan.</p>
    </div>

    <div class="type-fields" id="fields-wifi">
      <div class="field">
        <label>Network name (SSID)</label>
        <input type="text" id="input-wifi-ssid" placeholder="YourCafeWifi" oninput="generate()">
      </div>
      <div class="row">
        <div class="field">
          <label>Password</label>
          <input type="text" id="input-wifi-pass" placeholder="password123" oninput="generate()">
        </div>
        <div class="field">
          <label>Security</label>
          <select id="input-wifi-enc" onchange="generate()">
            <option value="WPA">WPA/WPA2</option>
            <option value="WEP">WEP</option>
            <option value="nopass">None (open)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="type-fields" id="fields-phone">
      <div class="field">
        <label>Phone number</label>
        <input type="tel" id="input-phone" placeholder="(555) 123-4567" oninput="generate()">
      </div>
    </div>

    <div class="type-fields" id="fields-email">
      <div class="field">
        <label>Email address</label>
        <input type="email" id="input-email" placeholder="hello@yourbusiness.com" oninput="generate()">
      </div>
      <div class="field">
        <label>Subject (optional)</label>
        <input type="text" id="input-email-subject" placeholder="Inquiry from QR code" oninput="generate()">
      </div>
    </div>

    <div class="type-fields" id="fields-text">
      <div class="field">
        <label>Text content</label>
        <input type="text" id="input-text" placeholder="Any text, address, message..." oninput="generate()">
      </div>
    </div>
  </div>

  <!-- DESIGN OPTIONS -->
  <div class="card">
    <div class="card-title">Design</div>
    <div class="field">
      <label>Size</label>
      <div class="size-tabs" id="size-tabs">
        <button class="size-tab" data-size="200">Small</button>
        <button class="size-tab active" data-size="300">Medium</button>
        <button class="size-tab" data-size="400">Large</button>
      </div>
    </div>
    <div class="field">
      <div class="color-row">
        <div class="color-field">
          <label>QR color</label>
          <input type="color" id="color-fg" value="#1a1a1a" oninput="generate()">
        </div>
        <div class="color-field">
          <label>Background</label>
          <input type="color" id="color-bg" value="#ffffff" oninput="generate()">
        </div>
      </div>
    </div>
    <div class="field">
      <label>Business name below QR (optional)</label>
      <input type="text" id="input-bizname" placeholder="Your Business Name" oninput="generate()">
    </div>
  </div>

  <!-- PREVIEW & DOWNLOAD -->
  <div class="card">
    <div class="card-title">Preview</div>
    <div class="preview-area">
      <div id="qr-canvas-wrap"></div>
      <div class="biz-name-preview" id="biz-name-display"></div>
      <div class="preview-empty" id="preview-empty">Type something above to see your QR code</div>
    </div>
    <div class="download-row" id="download-row" style="display:none;">
      <button class="btn-primary" onclick="downloadPNG()">Download PNG</button>
      <button class="btn-secondary" onclick="downloadSVG()">Download SVG</button>
    </div>
  </div>

  <!-- API: window.qrGen -->
</div>

<!-- QR Code library - lightweight, no dependencies -->

<script>
// ══════════════════════════════════════
//  APP STATE
// ══════════════════════════════════════
let currentType = 'url';
let currentSize = 300;
let currentData = '';
let debounceTimer = null;

// ══════════════════════════════════════
//  TYPE TABS
// ══════════════════════════════════════
document.getElementById('type-tabs').addEventListener('click', function(e) {
  if (!e.target.classList.contains('type-tab')) return;
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  currentType = e.target.dataset.type;
  document.querySelectorAll('.type-fields').forEach(f => f.classList.remove('active'));
  document.getElementById('fields-' + currentType).classList.add('active');
  generate();
});

// ══════════════════════════════════════
//  SIZE TABS
// ══════════════════════════════════════
document.getElementById('size-tabs').addEventListener('click', function(e) {
  if (!e.target.classList.contains('size-tab')) return;
  document.querySelectorAll('.size-tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  currentSize = parseInt(e.target.dataset.size);
  generate();
});

// ══════════════════════════════════════
//  BUILD QR DATA STRING
// ══════════════════════════════════════
function getQRData() {
  switch (currentType) {
    case 'url':
      return document.getElementById('input-url').value.trim();
    case 'zelle': {
      const to = document.getElementById('input-zelle-to').value.trim();
      if (!to) return '';
      let link = 'https://enroll.zellepay.com/qr-codes?data=' + encodeURIComponent(JSON.stringify({ token: to, action: 'payment' }));
      return link;
    }
    case 'wifi': {
      const ssid = document.getElementById('input-wifi-ssid').value.trim();
      if (!ssid) return '';
      const pass = document.getElementById('input-wifi-pass').value;
      const enc = document.getElementById('input-wifi-enc').value;
      return 'WIFI:T:' + enc + ';S:' + escWifi(ssid) + ';P:' + escWifi(pass) + ';;';
    }
    case 'phone': {
      const phone = document.getElementById('input-phone').value.trim();
      return phone ? 'tel:' + phone : '';
    }
    case 'email': {
      const email = document.getElementById('input-email').value.trim();
      if (!email) return '';
      const subj = document.getElementById('input-email-subject').value.trim();
      return subj ? 'mailto:' + email + '?subject=' + encodeURIComponent(subj) : 'mailto:' + email;
    }
    case 'text':
      return document.getElementById('input-text').value.trim();
    default:
      return '';
  }
}

function escWifi(s) {
  return s.replace(/([\\;,:":])/g, '\\$1');
}

// ══════════════════════════════════════
//  GENERATE QR
// ══════════════════════════════════════
function generate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(_generate, 80);
}

function _generate() {
  const data = getQRData();
  currentData = data;
  const wrap = document.getElementById('qr-canvas-wrap');
  const emptyEl = document.getElementById('preview-empty');
  const dlRow = document.getElementById('download-row');
  const bizName = document.getElementById('input-bizname').value.trim();

  if (!data) {
    wrap.innerHTML = '';
    emptyEl.style.display = '';
    dlRow.style.display = 'none';
    document.getElementById('biz-name-display').textContent = '';
    return;
  }

  emptyEl.style.display = 'none';
  dlRow.style.display = 'flex';

  const fgColor = document.getElementById('color-fg').value;
  const bgColor = document.getElementById('color-bg').value;

  try {
    const qr = qrcode(0, 'M');
    qr.addData(data);
    qr.make();

    const moduleCount = qr.getModuleCount();
    const cellSize = Math.floor(currentSize / moduleCount);
    const totalSize = cellSize * moduleCount;

    const canvas = document.createElement('canvas');
    canvas.width = totalSize;
    canvas.height = totalSize;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, totalSize, totalSize);

    ctx.fillStyle = fgColor;
    for (let r = 0; r < moduleCount; r++) {
      for (let c = 0; c < moduleCount; c++) {
        if (qr.isDark(r, c)) {
          ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
        }
      }
    }

    wrap.innerHTML = '';
    wrap.appendChild(canvas);
  } catch (e) {
    wrap.innerHTML = '<div style="color:#B85C2C; font-size:13px;">Content too long for QR code. Try shortening your input.</div>';
    dlRow.style.display = 'none';
  }

  document.getElementById('biz-name-display').textContent = bizName;
  document.getElementById('biz-name-display').style.color = document.getElementById('color-fg').value;

  // Write agent result
  if (data) {
    const resultDiv = document.getElementById('terrapin-result') || document.createElement('div');
    resultDiv.id = 'terrapin-result';
    resultDiv.style.display = 'none';
    resultDiv.textContent = JSON.stringify({
      status: 'success',
      tool: 'QR Code Generator',
      output: 'QR code generated for: ' + currentType + ' — ' + data.substring(0, 100),
      timestamp: new Date().toISOString()
    });
    document.body.appendChild(resultDiv);
  }
}

// ══════════════════════════════════════
//  DOWNLOAD PNG (1000x1000)
// ══════════════════════════════════════
function downloadPNG() {
  const data = currentData;
  if (!data) return;

  const fgColor = document.getElementById('color-fg').value;
  const bgColor = document.getElementById('color-bg').value;
  const bizName = document.getElementById('input-bizname').value.trim();

  const qr = qrcode(0, 'M');
  qr.addData(data);
  qr.make();

  const moduleCount = qr.getModuleCount();
  const exportSize = 1000;
  const margin = 40;
  const bizHeight = bizName ? 50 : 0;
  const totalHeight = exportSize + bizHeight;
  const qrArea = exportSize - margin * 2;
  const cellSize = Math.floor(qrArea / moduleCount);
  const offset = Math.floor((exportSize - cellSize * moduleCount) / 2);

  const canvas = document.createElement('canvas');
  canvas.width = exportSize;
  canvas.height = totalHeight;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, exportSize, totalHeight);

  ctx.fillStyle = fgColor;
  for (let r = 0; r < moduleCount; r++) {
    for (let c = 0; c < moduleCount; c++) {
      if (qr.isDark(r, c)) {
        ctx.fillRect(offset + c * cellSize, offset + r * cellSize, cellSize, cellSize);
      }
    }
  }

  if (bizName) {
    ctx.fillStyle = fgColor;
    ctx.font = '600 28px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(bizName, exportSize / 2, exportSize + 34);
  }

  const link = document.createElement('a');
  link.download = 'qr-code.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ══════════════════════════════════════
//  DOWNLOAD SVG
// ══════════════════════════════════════
function downloadSVG() {
  const data = currentData;
  if (!data) return;

  const fgColor = document.getElementById('color-fg').value;
  const bgColor = document.getElementById('color-bg').value;
  const bizName = document.getElementById('input-bizname').value.trim();

  const qr = qrcode(0, 'M');
  qr.addData(data);
  qr.make();

  const moduleCount = qr.getModuleCount();
  const cellSize = 10;
  const margin = 20;
  const qrSize = moduleCount * cellSize;
  const svgW = qrSize + margin * 2;
  const bizH = bizName ? 40 : 0;
  const svgH = svgW + bizH;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">`;
  svg += `<rect width="100%" height="100%" fill="${bgColor}"/>`;

  for (let r = 0; r < moduleCount; r++) {
    for (let c = 0; c < moduleCount; c++) {
      if (qr.isDark(r, c)) {
        svg += `<rect x="${margin + c * cellSize}" y="${margin + r * cellSize}" width="${cellSize}" height="${cellSize}" fill="${fgColor}"/>`;
      }
    }
  }

  if (bizName) {
    svg += `<text x="${svgW / 2}" y="${svgW + 28}" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="${fgColor}">${escXml(bizName)}</text>`;
  }

  svg += '</svg>';

  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const link = document.createElement('a');
  link.download = 'qr-code.svg';
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}

function escXml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ══════════════════════════════════════
//  PROGRAMMATIC API
// ══════════════════════════════════════
/**
 * window.qrGen — programmatic API for AI agents.
 *
 * Input schema:
 *   {
 *     type: "url" | "wifi" | "phone" | "email" | "text",
 *     data: "https://example.com",          // for url/phone/email/text
 *     wifi: { ssid: "Net", password: "pw", encryption: "WPA" },  // for wifi type
 *     fgColor: "#000000",                   // optional
 *     bgColor: "#ffffff",                   // optional
 *     bizName: "My Business"                // optional
 *   }
 *
 * Returns: { svgString, pngDataURL, data }
 */
window.qrGen = {
  generate(opts) {
    if (!opts) throw new Error('Options required');
    let data = '';
    switch (opts.type) {
      case 'url': case 'text': data = opts.data || ''; break;
      case 'phone': data = 'tel:' + (opts.data || ''); break;
      case 'email': data = 'mailto:' + (opts.data || ''); break;
      case 'wifi': {
        const w = opts.wifi || {};
        data = 'WIFI:T:' + (w.encryption || 'WPA') + ';S:' + (w.ssid || '') + ';P:' + (w.password || '') + ';;';
        break;
      }
      default: data = opts.data || '';
    }
    if (!data) throw new Error('No data to encode');

    const fg = opts.fgColor || '#000000';
    const bg = opts.bgColor || '#ffffff';
    const biz = opts.bizName || '';

    const qr = qrcode(0, 'M');
    qr.addData(data);
    qr.make();
    const mc = qr.getModuleCount();
    const cs = 10;
    const m = 20;
    const qrS = mc * cs;
    const svgW = qrS + m * 2;
    const bizH = biz ? 40 : 0;
    const svgH = svgW + bizH;

    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">`;
    svg += `<rect width="100%" height="100%" fill="${bg}"/>`;
    for (let r = 0; r < mc; r++) {
      for (let c = 0; c < mc; c++) {
        if (qr.isDark(r, c)) svg += `<rect x="${m+c*cs}" y="${m+r*cs}" width="${cs}" height="${cs}" fill="${fg}"/>`;
      }
    }
    if (biz) svg += `<text x="${svgW/2}" y="${svgW+28}" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="${fg}">${escXml(biz)}</text>`;
    svg += '</svg>';

    // PNG via canvas
    const expSize = 1000;
    const em = 40;
    const eqA = expSize - em * 2;
    const eCS = Math.floor(eqA / mc);
    const eOff = Math.floor((expSize - eCS * mc) / 2);
    const eBH = biz ? 50 : 0;
    const canvas = document.createElement('canvas');
    canvas.width = expSize;
    canvas.height = expSize + eBH;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = fg;
    for (let r = 0; r < mc; r++) {
      for (let c = 0; c < mc; c++) {
        if (qr.isDark(r, c)) ctx.fillRect(eOff+c*eCS, eOff+r*eCS, eCS, eCS);
      }
    }
    if (biz) { ctx.fillStyle = fg; ctx.font = '600 28px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(biz, expSize/2, expSize+34); }

    return { svgString: svg, pngDataURL: canvas.toDataURL('image/png'), data };
  }
};

window.qrGenReady = Promise.resolve(true);

// ══════════════════════════════════════
//  URL PARAMETER PRE-FILL
// ══════════════════════════════════════
(function() {
  const params = new URLSearchParams(window.location.search);

  // Type selection
  const type = params.get('type');
  if (type) {
    const tab = document.querySelector('.type-tab[data-type="' + type + '"]');
    if (tab) {
      document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentType = type;
      document.querySelectorAll('.type-fields').forEach(f => f.classList.remove('active'));
      const fields = document.getElementById('fields-' + type);
      if (fields) fields.classList.add('active');
    }
  }

  // Data fields
  const data = params.get('data');
  if (data) {
    const typeInputMap = { url: 'input-url', phone: 'input-phone', email: 'input-email', text: 'input-text' };
    const inputId = typeInputMap[currentType];
    if (inputId) document.getElementById(inputId).value = data;
  }

  // WiFi
  const ssid = params.get('wifi_ssid');
  const pass = params.get('wifi_pass');
  const enc = params.get('wifi_enc');
  if (ssid) document.getElementById('input-wifi-ssid').value = ssid;
  if (pass) document.getElementById('input-wifi-pass').value = pass;
  if (enc) document.getElementById('input-wifi-enc').value = enc;

  // Zelle
  const zelleTo = params.get('zelle_to');
  const zelleAmt = params.get('zelle_amount');
  const zelleMemo = params.get('zelle_memo');
  if (zelleTo) document.getElementById('input-zelle-to').value = zelleTo;
  if (zelleAmt) document.getElementById('input-zelle-amount').value = zelleAmt;
  if (zelleMemo) document.getElementById('input-zelle-memo').value = zelleMemo;

  // Email subject
  const emailSubj = params.get('email_subject');
  if (emailSubj) document.getElementById('input-email-subject').value = emailSubj;

  // Design
  const fg = params.get('fg_color');
  const bg = params.get('bg_color');
  if (fg) document.getElementById('color-fg').value = fg.startsWith('#') ? fg : '#' + fg;
  if (bg) document.getElementById('color-bg').value = bg.startsWith('#') ? bg : '#' + bg;

  const size = params.get('size');
  if (size) {
    const sizeTab = document.querySelector('.size-tab[data-size="' + size + '"]');
    if (sizeTab) {
      document.querySelectorAll('.size-tab').forEach(t => t.classList.remove('active'));
      sizeTab.classList.add('active');
      currentSize = parseInt(size);
    }
  }

  const bizName = params.get('biz_name');
  if (bizName) document.getElementById('input-bizname').value = bizName;

  if (params.toString()) generate();
})();

// ══════════════════════════════════════
//  BUSINESS PROFILE PRE-FILL
// ══════════════════════════════════════
(function() {
  try {
    const profile = JSON.parse(localStorage.getItem('terrapin_business_profile'));
    if (!profile) return;
    window._terrapinProfile = profile;
    // Pre-fill biz name if not already set
    const bizInput = document.getElementById('input-bizname');
    if (!bizInput.value && profile.businessName) {
      bizInput.value = profile.businessName;
    }
  } catch(e) {}
})();
